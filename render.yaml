services:
  - type: web
    name: ecoe-mvp-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ecoe-mvp-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ecoe-mvp-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ecoe-mvp-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: ecoe-mvp-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npx vite build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ecoe-mvp-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ecoe-mvp-db
    databaseName: ecoe_db
    user: ecoe_user
    plan: free
    region: oregon
